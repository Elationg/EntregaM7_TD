# ─────────────────────────────────────────────────────────────────────────────
# GitHub Pages — Deploy Portfolio
#
# Cómo usar:
#   1. Sube este repositorio a GitHub (usuario: Elationg, repo: portfolio o M7)
#   2. Ve a Settings → Pages → Source → selecciona "GitHub Actions"
#   3. Cada push a la rama `main` desplegará el portafolio automáticamente.
#   4. La URL pública será: https://elationg.github.io/<nombre-del-repo>/
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main          # Se dispara en cada push a main
  workflow_dispatch:  # Permite ejecutar manualmente desde la pestaña "Actions"

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evitar deploys simultáneos (cancela el anterior si hay uno en curso)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Job 1: Build (valida que los archivos existen) ────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # El portafolio es HTML/CSS estático — no necesita compilación.
      # Este paso empaqueta toda la carpeta raíz como artefacto de Pages.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube el contenido de la raíz del repositorio.
          # Si mueves portfolio.html a una subcarpeta, actualiza esta ruta.
          path: "."

  # ── Job 2: Deploy (publica en GitHub Pages) ───────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
